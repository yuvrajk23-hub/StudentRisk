name: Student Risk Analytics Pipeline

# Runs automatically every day at 03:00 UTC, and can also be triggered
# manually from the Actions tab (useful for a live viva demo).
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest      # a fresh, isolated container for every run
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java (required by Spark)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic student data
        run: python scripts/generate_data.py

      - name: Run PySpark risk-analytics pipeline
        run: python scripts/spark_pipeline.py

      - name: Commit updated results back to the repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Automated pipeline run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
